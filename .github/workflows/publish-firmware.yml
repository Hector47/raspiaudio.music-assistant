name: Publish Firmware

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-firmware:
    name: Build Firmware
    uses: esphome/workflows/.github/workflows/build.yml@e7eee2a828517c042794a831f75310959fbf2a16  # 2025.10.0
    with:
      #### Modify below here to match your project ####
      files: |
        muse-luxe.factory.yaml
      esphome-version: 2026.2.4
      #combined-name: muse-luxe
      #### Modify above here to match your project ####

      release-summary: ${{ github.event.release.body }}
      release-url: ${{ github.event.release.html_url }}
      release-version: ${{ github.event.release.tag_name }}

  upload-to-release:
    name: Upload to Release
    uses: esphome/workflows/.github/workflows/upload-to-gh-release.yml@3c4e8446aa1029f1c346a482034b3ee1489077ca  # 2026.4.0
    needs:
      - build-firmware
    with:
      version: ${{ github.event.release.tag_name }}
